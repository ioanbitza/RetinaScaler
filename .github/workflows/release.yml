name: Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      release_notes:
        description: 'Release notes (optional — auto-generated if empty)'
        required: false
        type: string

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate next version
        id: version
        run: |
          LATEST=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
          fi

          MAJOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f1)
          MINOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f2)
          PATCH=$(echo "$LATEST" | sed 's/v//' | cut -d. -f3)

          RELEASE_TYPE="${{ inputs.release_type }}"
          case "$RELEASE_TYPE" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Previous: $LATEST → New: v$VERSION ($RELEASE_TYPE)"

      - name: Build release binary
        run: swift build -c release

      - name: Prepare .app bundle
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          APP="RetinaScaler.app"
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"
          cp .build/release/RetinaScaler "$APP/Contents/MacOS/RetinaScaler"

          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" "$APP/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $VERSION" "$APP/Contents/Info.plist"

      - name: Ad-hoc code sign
        run: codesign --force --sign - --deep RetinaScaler.app

      - name: Create DMG
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p dmg_staging
          cp -R RetinaScaler.app dmg_staging/
          ln -s /Applications dmg_staging/Applications
          hdiutil create -volname "RetinaScaler" -srcfolder dmg_staging -ov -format UDZO "RetinaScaler-${VERSION}.dmg"

      - name: Create ZIP
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: zip -r "RetinaScaler-${VERSION}.zip" RetinaScaler.app

      - name: Create tag
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: RetinaScaler ${{ steps.version.outputs.tag }}
          body: ${{ inputs.release_notes || '' }}
          generate_release_notes: ${{ inputs.release_notes == '' }}
          files: |
            RetinaScaler-*.dmg
            RetinaScaler-*.zip
