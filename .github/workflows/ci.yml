name: CI

on:
  push:
    branches: [develop, 'release/*', 'hotfix/*']
  pull_request:
    branches: [develop, main]

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build Debug
        run: swift build

      - name: Build Release
        run: swift build -c release
